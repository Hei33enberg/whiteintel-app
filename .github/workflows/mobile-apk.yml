name: Android APK

# Builds the WhiteIntel Android app (Capacitor thin shell over whiteintel.dev) into a
# downloadable .apk. This machine has no JDK/Android SDK, so the build runs on GitHub's
# ubuntu runner (which ships both). Grab the artifact from the run's "Artifacts" section.
#
# Signing: if the ANDROID_KEYSTORE_* secrets are present it builds a SIGNED release APK
# (upgrade-safe, Play-Store-ready); otherwise it falls back to a debug APK so the pipeline
# never hard-fails. versionCode is the monotonically increasing run number so Android
# recognises each new APK as an upgrade (the android/ project is gitignored + regenerated,
# so the version is stamped in here, not committed).
on:
  push:
    paths: ["mobile/**", ".github/workflows/mobile-apk.yml"]
  workflow_dispatch: {}

permissions:
  contents: write   # publish the APK as a GitHub Release asset

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Pin the build-tools the signing step needs (zipalign/apksigner) so it never depends on a
      # fragile "newest match" glob that could resolve empty.
      - name: Ensure build-tools 34.0.0
        run: sdkmanager "build-tools;34.0.0"

      - name: Resolve version
        id: ver
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # versionCode MUST be a monotonically increasing integer or Android won't treat a
          # newer APK as an upgrade — the run number always increases.
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Install JS deps
        run: npm install

      # The generated android/ project is gitignored (standard Capacitor practice), so
      # regenerate it in CI from capacitor.config.ts + www, then it's build-ready.
      - name: Add Android platform
        run: npx cap add android

      # Generate ALL launcher/splash assets from mobile/resources/icon.png + splash.png.
      # WITHOUT this, cap add ships Capacitor default icons — the generic C on turquoise
      # (v0.1.4 bug: user home-screen icon changed from custom to default). The
      # @capacitor/assets devDep is already in mobile/package.json.
      - name: Generate app icons + splash from resources/
        run: npx @capacitor/assets generate --android

      # android/ is freshly regenerated (versionCode 1 / versionName "1.0" scaffold defaults),
      # so stamp the real version into it before building.
      - name: Stamp versionCode / versionName
        run: |
          GRADLE=android/app/build.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ steps.ver.outputs.code }}/" "$GRADLE"
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${{ steps.ver.outputs.version }}\"/" "$GRADLE"
          grep -E "versionCode|versionName" "$GRADLE"

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/wi-release.jks
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — building a DEBUG-signed APK (not a production signing identity). Add the ANDROID_KEYSTORE_* secrets to ship a signed release APK."
          fi

      - name: Build signed release APK
        if: steps.keystore.outputs.present == 'true'
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease
          BT="$ANDROID_HOME/build-tools/34.0.0/"
          "${BT}zipalign" -f 4 app/build/outputs/apk/release/app-release-unsigned.apk ../aligned.apk
          "${BT}apksigner" sign \
            --ks app/wi-release.jks --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" \
            --out ../WhiteIntel.apk ../aligned.apk

      - name: Build debug APK (fallback — no keystore)
        if: steps.keystore.outputs.present != 'true'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../WhiteIntel.apk

      - name: Upload APK as a run artifact
        uses: actions/upload-artifact@v4
        with:
          name: whiteintel-android-apk
          path: mobile/WhiteIntel.apk
          if-no-files-found: error

      # Publish ONLY from the PUBLIC downloads repo, whose same-repo GITHUB_TOKEN can create the
      # release. In the private source repo the token can't publish cross-repo (403), so skip.
      - name: Publish APK to the release
        if: github.repository == 'Hei33enberg/whiteintel-app'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: WhiteIntel v${{ steps.ver.outputs.version }}
          files: mobile/WhiteIntel.apk
